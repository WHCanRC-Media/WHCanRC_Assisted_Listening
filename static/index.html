<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WHCanRC Assisted Listening</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 1.4rem;
    margin-bottom: 8px;
    text-align: center;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 32px;
    text-align: center;
  }
  #listen-btn {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid #4a90d9;
    background: rgba(74, 144, 217, 0.15);
    color: #4a90d9;
    font-size: 1.3rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  #listen-btn:hover { background: rgba(74, 144, 217, 0.3); }
  #listen-btn:active { transform: scale(0.95); }
  #listen-btn.live {
    border-color: #4caf50;
    background: rgba(76, 175, 80, 0.15);
    color: #4caf50;
  }
  #listen-btn.connecting {
    border-color: #ff9800;
    background: rgba(255, 152, 0, 0.15);
    color: #ff9800;
    animation: pulse 1.5s infinite;
  }
  #listen-btn.error {
    border-color: #f44336;
    background: rgba(244, 67, 54, 0.15);
    color: #f44336;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  #status {
    margin-top: 24px;
    font-size: 0.95rem;
    color: #888;
    text-align: center;
  }
  .level-container {
    margin-top: 24px;
    width: 200px;
    height: 8px;
    background: #333;
    border-radius: 4px;
    overflow: hidden;
  }
  #level-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4caf50, #ff9800, #f44336);
    border-radius: 4px;
    transition: width 0.1s ease;
  }
  .level-label {
    margin-top: 6px;
    font-size: 0.75rem;
    color: #666;
    text-align: center;
  }
  .nav {
    margin-top: 32px;
  }
  .nav a {
    font-size: 0.8rem;
    color: #4a90d9;
    text-decoration: none;
  }
  .nav a:hover { text-decoration: underline; }
  .transport-badge {
    margin-top: 16px;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
  }
  .transport-badge.webtransport {
    background: rgba(156, 39, 176, 0.2);
    color: #ce93d8;
    border: 1px solid #9c27b0;
  }
  .transport-badge.webrtc {
    background: rgba(255, 152, 0, 0.2);
    color: #ffb74d;
    border: 1px solid #ff9800;
  }
  .toggle-row {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: #888;
  }
  .toggle-switch {
    position: relative;
    width: 40px;
    height: 22px;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: #444;
    border-radius: 22px;
    transition: 0.3s;
  }
  .toggle-slider:before {
    content: "";
    position: absolute;
    height: 16px;
    width: 16px;
    left: 3px;
    bottom: 3px;
    background: #ccc;
    border-radius: 50%;
    transition: 0.3s;
  }
  .toggle-switch input:checked + .toggle-slider { background: #ff9800; }
  .toggle-switch input:checked + .toggle-slider:before { transform: translateX(18px); }
</style>
</head>
<body>

<h1>WHCanRC Assisted Listening</h1>
<p class="subtitle">Tap to start listening</p>

<button id="listen-btn" onclick="toggleListen()">Listen</button>

<p id="status">Ready</p>

<div class="level-container">
  <div id="level-bar"></div>
</div>
<p class="level-label">Audio Level</p>

<div class="toggle-row">
  <span>WebTransport</span>
  <label class="toggle-switch">
    <input type="checkbox" id="force-webrtc" onchange="onTransportToggle()">
    <span class="toggle-slider"></span>
  </label>
  <span>WebRTC</span>
</div>

<div id="transport-badge" class="transport-badge" style="display: none;"></div>

<div id="buffer-info" style="display: none; margin-top: 16px; text-align: center;">
  <div style="font-size: 0.75rem; color: #666; margin-bottom: 4px;">Buffer Depth</div>
  <div style="width: 200px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; position: relative;">
    <div id="buffer-target" style="position: absolute; height: 100%; width: 1px; background: #fff; opacity: 0.5;"></div>
    <div id="buffer-bar" style="height: 100%; width: 0%; background: #4caf50; border-radius: 4px; transition: width 0.2s ease;"></div>
  </div>
  <div id="buffer-label" style="font-size: 0.7rem; color: #888; margin-top: 4px;">0ms</div>
</div>

<script>
let pc = null;
let wt = null; // WebTransport connection
let audioCtx = null;
let analyser = null;
let animFrame = null;
let isListening = false;
let reconnectTimeout = null;
let transportMode = null; // 'webtransport' or 'webrtc'
let webtransportPort = null;

const btn = document.getElementById('listen-btn');
const statusEl = document.getElementById('status');
const levelBar = document.getElementById('level-bar');
const transportBadge = document.getElementById('transport-badge');

function setStatus(text, state) {
  statusEl.textContent = text;
  btn.className = state || '';
}

function toggleListen() {
  if (isListening) {
    disconnect();
  } else {
    connect();
  }
}

function onTransportToggle() {
  // If currently listening, reconnect with the new transport
  if (isListening) {
    disconnect();
    connect();
  }
}

function setTransportBadge(mode) {
  transportMode = mode;
  transportBadge.style.display = 'block';
  transportBadge.className = 'transport-badge ' + mode;
  transportBadge.textContent = mode === 'webtransport' ? 'WebTransport' : 'WebRTC (fallback)';
}

async function connect() {
  if (pc || wt) disconnect();
  isListening = true;
  btn.textContent = 'Stop';
  setStatus('Connecting...', 'connecting');

  const forceWebRTC = document.getElementById('force-webrtc').checked;

  // Get WebTransport port info
  try {
    const info = await fetch('/transport-info').then(r => r.json());
    webtransportPort = info.webtransport_port;
  } catch (e) {
    console.warn('Could not get transport info:', e);
  }

  // Try WebTransport first (if supported and not forced to WebRTC)
  if (!forceWebRTC && typeof WebTransport !== 'undefined' && webtransportPort) {
    try {
      await connectWebTransport();
      return;
    } catch (e) {
      console.warn('WebTransport failed, falling back to WebRTC:', e);
    }
  }

  // Fall back to WebRTC
  await connectWebRTC();
}

async function connectWebTransport() {
  const host = window.location.hostname;
  const url = `https://${host}:${webtransportPort}/audio`;

  console.log('Trying WebTransport:', url);

  // Get cert hash from server
  const info = await fetch('/transport-info').then(r => r.json());
  if (!info.cert_hash) {
    throw new Error('WebTransport cert hash not available');
  }

  // Convert base64 cert hash to ArrayBuffer for WebTransport
  const hashBytes = Uint8Array.from(atob(info.cert_hash), c => c.charCodeAt(0));

  const options = {
    serverCertificateHashes: [{
      algorithm: 'sha-256',
      value: hashBytes.buffer
    }]
  };

  wt = new WebTransport(url, options);

  wt.closed.then(() => {
    console.log('WebTransport closed');
    if (isListening) {
      setStatus('Disconnected — reconnecting...', 'connecting');
      scheduleReconnect();
    }
  }).catch(e => {
    console.error('WebTransport closed with error:', e);
  });

  await wt.ready;
  console.log('WebTransport connected');

  setTransportBadge('webtransport');
  setStatus('Live', 'live');

  // Set up audio playback from datagrams
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({
    latencyHint: 'interactive',
    sampleRate: 48000,
  });

  // Create an AudioWorklet for playing raw PCM datagrams
  await audioCtx.audioWorklet.addModule(createPcmWorkletURL());

  const workletNode = new AudioWorkletNode(audioCtx, 'pcm-player', {
    outputChannelCount: [1],
  });

  // Show buffer depth UI for WebTransport
  const bufferInfo = document.getElementById('buffer-info');
  const bufferBar = document.getElementById('buffer-bar');
  const bufferLabel = document.getElementById('buffer-label');
  const bufferTarget = document.getElementById('buffer-target');
  bufferInfo.style.display = 'block';

  // Position target marker (max display = 4x target)
  const maxDisplayMs = WT_TARGET_BUFFER_MS * 4;
  bufferTarget.style.left = (WT_TARGET_BUFFER_MS / maxDisplayMs * 100) + '%';

  // Log and display adaptive buffer status from worklet
  workletNode.port.onmessage = (e) => {
    const msg = e.data;
    if (msg.type === 'status') {
      const ms = parseFloat(msg.bufferMs);
      const pct = Math.min(100, ms / maxDisplayMs * 100);
      bufferBar.style.width = pct + '%';
      bufferBar.style.background = ms < WT_TARGET_BUFFER_MS * 0.3 ? '#f44336'
        : ms > WT_TARGET_BUFFER_MS * 2 ? '#ff9800' : '#4caf50';
      bufferLabel.textContent = `${msg.bufferMs}ms (rate ${msg.rate})`;
    } else if (msg.type === 'skip') {
      console.warn(`[WT buffer] Skipped ${msg.skipped} samples to prevent overflow`);
    }
  };

  // Create analyser for level meter
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  workletNode.connect(analyser);
  analyser.connect(audioCtx.destination);

  updateLevel();

  // Read datagrams, strip header, and send PCM payload + metadata to worklet
  const reader = wt.datagrams.readable.getReader();
  let lastSeq = -1;
  let lostPackets = 0;
  (async () => {
    try {
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        const dv = new DataView(value.buffer, value.byteOffset, value.byteLength);
        if (value.byteLength < 8) continue; // malformed

        const seq = dv.getUint32(0, true);
        const timestamp = dv.getUint32(4, true);

        // Detect packet loss
        if (lastSeq >= 0) {
          const expected = (lastSeq + 1) >>> 0; // u32 wrap
          if (seq !== expected) {
            const gap = (seq - expected) >>> 0;
            if (gap < 1000) { // reasonable gap, not a wrap glitch
              lostPackets += gap;
              console.warn(`WebTransport: lost ${gap} packet(s) (seq ${expected}..${seq - 1}), total lost: ${lostPackets}`);
            }
          }
        }
        lastSeq = seq;

        // Extract PCM payload (after 8-byte header)
        const pcmBytes = value.slice(8);
        workletNode.port.postMessage({ pcm: pcmBytes, seq, timestamp }, [pcmBytes.buffer]);
      }
    } catch (e) {
      console.error('Datagram read error:', e);
    }
  })();
}

// Target buffer level in milliseconds — tune this constant to trade off
// latency vs. drift resilience. Lower = less latency, higher = smoother.
const WT_TARGET_BUFFER_MS = 30;

function createPcmWorkletURL() {
  // AudioWorklet for playing raw PCM i16 samples with adaptive drift correction
  const code = `
// Target buffer level in samples (passed from main thread)
const SAMPLE_RATE = 48000;
let TARGET_BUFFER_SAMPLES = ${Math.round(48000 * WT_TARGET_BUFFER_MS / 1000)};
const MAX_BUFFER_SAMPLES = TARGET_BUFFER_SAMPLES * 4;

// Playback rate adjustment bounds (subtle — avoids audible pitch shift)
const RATE_ADJUST_MAX = 0.02;  // +/- 2% max speed correction

class PcmPlayerProcessor extends AudioWorkletProcessor {
  constructor() {
    super();
    this.buffer = new Float32Array(0);
    this.readPos = 0.0; // fractional read position for resampling
    this.logCounter = 0;

    this.port.onmessage = (e) => {
      const msg = e.data;
      const bytes = new Uint8Array(msg.pcm || msg);
      const samples = new Int16Array(bytes.buffer, bytes.byteOffset, bytes.byteLength / 2);

      // Convert i16 to f32
      const floats = new Float32Array(samples.length);
      for (let i = 0; i < samples.length; i++) {
        floats[i] = samples[i] / 32768.0;
      }

      // Append to playback buffer
      const newBuffer = new Float32Array(this.buffer.length + floats.length);
      newBuffer.set(this.buffer);
      newBuffer.set(floats, this.buffer.length);
      this.buffer = newBuffer;

      // Hard cap: if buffer grows way too large, skip to target level
      if (this.buffer.length > MAX_BUFFER_SAMPLES) {
        const skip = this.buffer.length - TARGET_BUFFER_SAMPLES;
        this.buffer = this.buffer.slice(skip);
        this.port.postMessage({ type: 'skip', skipped: skip });
      }
    };
  }

  process(inputs, outputs, parameters) {
    const output = outputs[0][0];
    if (!output) return true;
    const outLen = output.length; // typically 128 samples

    const bufLen = this.buffer.length;
    if (bufLen === 0) {
      // Underrun — output silence
      return true;
    }

    // Adaptive rate: speed up if buffer too full, slow down if too empty
    const error = bufLen - TARGET_BUFFER_SAMPLES;
    // Proportional correction: normalize by target, clamp to bounds
    const correction = Math.max(-RATE_ADJUST_MAX, Math.min(RATE_ADJUST_MAX,
        (error / TARGET_BUFFER_SAMPLES) * RATE_ADJUST_MAX));
    const playbackRate = 1.0 + correction;

    // Read samples at adjusted rate using linear interpolation
    let readPos = 0.0;
    for (let i = 0; i < outLen; i++) {
      const srcIdx = readPos;
      const idx = Math.floor(srcIdx);
      const frac = srcIdx - idx;

      if (idx + 1 < bufLen) {
        output[i] = this.buffer[idx] * (1 - frac) + this.buffer[idx + 1] * frac;
      } else if (idx < bufLen) {
        output[i] = this.buffer[idx];
      }
      // else: stays 0 (silence)

      readPos += playbackRate;
    }

    // Consume the samples we read
    const consumed = Math.min(Math.ceil(readPos), bufLen);
    this.buffer = this.buffer.slice(consumed);

    // Periodic status log
    this.logCounter++;
    if (this.logCounter % 375 === 0) { // ~every 1s at 128-sample blocks
      this.port.postMessage({
        type: 'status',
        bufferMs: (this.buffer.length / SAMPLE_RATE * 1000).toFixed(1),
        rate: playbackRate.toFixed(4),
      });
    }

    return true;
  }
}
registerProcessor('pcm-player', PcmPlayerProcessor);
`;
  const blob = new Blob([code], { type: 'application/javascript' });
  return URL.createObjectURL(blob);
}

async function connectWebRTC() {
  setTransportBadge('webrtc');

  try {
    pc = new RTCPeerConnection({ iceServers: [] });

    pc.ontrack = (event) => {
      const stream = event.streams[0] || new MediaStream([event.track]);

      // Request minimum jitter buffer (low latency mode)
      const receiver = event.receiver;
      if ('jitterBufferTarget' in receiver) {
        receiver.jitterBufferTarget = 0;
        console.log('Set jitterBufferTarget = 0');
      } else if ('playoutDelayHint' in receiver) {
        receiver.playoutDelayHint = 0;
        console.log('Set playoutDelayHint = 0');
      }

      // Play audio
      const audio = new Audio();
      audio.srcObject = stream;
      audio.play().catch(() => {});

      // Set up level meter
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);
      updateLevel();
    };

    pc.oniceconnectionstatechange = () => {
      const state = pc.iceConnectionState;
      if (state === 'connected' || state === 'completed') {
        setStatus('Live', 'live');
      } else if (state === 'disconnected') {
        setStatus('Disconnected — reconnecting...', 'connecting');
        scheduleReconnect();
      } else if (state === 'failed' || state === 'closed') {
        setStatus('Connection lost — reconnecting...', 'error');
        scheduleReconnect();
      }
    };

    pc.addTransceiver('audio', { direction: 'recvonly' });

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    // Wait for ICE gathering to complete so candidates are in the SDP
    if (pc.iceGatheringState !== 'complete') {
      await new Promise((resolve) => {
        const check = () => {
          if (pc.iceGatheringState === 'complete') {
            pc.removeEventListener('icegatheringstatechange', check);
            resolve();
          }
        };
        pc.addEventListener('icegatheringstatechange', check);
        // Safety timeout
        setTimeout(resolve, 5000);
      });
    }

    const response = await fetch('/offer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sdp: pc.localDescription.sdp,
        type: pc.localDescription.type
      })
    });

    if (!response.ok) {
      throw new Error('Server returned ' + response.status);
    }

    const answer = await response.json();
    await pc.setRemoteDescription(new RTCSessionDescription({
      sdp: answer.sdp,
      type: answer.type
    }));

  } catch (e) {
    console.error('WebRTC connection error:', e);
    setStatus('Error: ' + e.message, 'error');
    scheduleReconnect();
  }
}

function disconnect() {
  isListening = false;
  btn.textContent = 'Listen';
  clearTimeout(reconnectTimeout);
  reconnectTimeout = null;

  if (animFrame) {
    cancelAnimationFrame(animFrame);
    animFrame = null;
  }
  if (audioCtx) {
    audioCtx.close().catch(() => {});
    audioCtx = null;
    analyser = null;
  }
  if (pc) {
    pc.close();
    pc = null;
  }
  if (wt) {
    wt.close();
    wt = null;
  }
  transportMode = null;
  transportBadge.style.display = 'none';
  levelBar.style.width = '0%';
  const bufferInfo = document.getElementById('buffer-info');
  if (bufferInfo) bufferInfo.style.display = 'none';
  setStatus('Ready', '');
}

function scheduleReconnect() {
  if (!isListening || reconnectTimeout) return;
  reconnectTimeout = setTimeout(() => {
    reconnectTimeout = null;
    if (isListening) {
      if (pc) { pc.close(); pc = null; }
      connect();
    }
  }, 3000);
}

function updateLevel() {
  if (!analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  let sum = 0;
  for (let i = 0; i < data.length; i++) sum += data[i];
  const avg = sum / data.length;
  const pct = Math.min(100, (avg / 128) * 100);
  levelBar.style.width = pct + '%';
  animFrame = requestAnimationFrame(updateLevel);
}
</script>

<div class="nav">
  <a href="/latency_test">Latency Test</a>
</div>

</body>
</html>
