<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WHCanRC Assisted Listening</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 1.4rem;
    margin-bottom: 8px;
    text-align: center;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 32px;
    text-align: center;
  }
  #listen-btn {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid #4a90d9;
    background: rgba(74, 144, 217, 0.15);
    color: #4a90d9;
    font-size: 1.3rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  #listen-btn:hover { background: rgba(74, 144, 217, 0.3); }
  #listen-btn:active { transform: scale(0.95); }
  #listen-btn.live {
    border-color: #4caf50;
    background: rgba(76, 175, 80, 0.15);
    color: #4caf50;
  }
  #listen-btn.connecting {
    border-color: #ff9800;
    background: rgba(255, 152, 0, 0.15);
    color: #ff9800;
    animation: pulse 1.5s infinite;
  }
  #listen-btn.error {
    border-color: #f44336;
    background: rgba(244, 67, 54, 0.15);
    color: #f44336;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  #status {
    margin-top: 24px;
    font-size: 0.95rem;
    color: #888;
    text-align: center;
  }
  .level-container {
    margin-top: 24px;
    width: 200px;
    height: 8px;
    background: #333;
    border-radius: 4px;
    overflow: hidden;
  }
  #level-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4caf50, #ff9800, #f44336);
    border-radius: 4px;
    transition: width 0.1s ease;
  }
  .level-label {
    margin-top: 6px;
    font-size: 0.75rem;
    color: #666;
    text-align: center;
  }
  .nav {
    margin-top: 32px;
  }
  .nav a {
    font-size: 0.8rem;
    color: #4a90d9;
    text-decoration: none;
  }
  .nav a:hover { text-decoration: underline; }
  .transport-badge {
    margin-top: 16px;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
  }
  .transport-badge.webtransport {
    background: rgba(156, 39, 176, 0.2);
    color: #ce93d8;
    border: 1px solid #9c27b0;
  }
  .transport-badge.webrtc {
    background: rgba(255, 152, 0, 0.2);
    color: #ffb74d;
    border: 1px solid #ff9800;
  }
</style>
</head>
<body>

<h1>WHCanRC Assisted Listening</h1>
<p class="subtitle">Tap to start listening</p>

<button id="listen-btn" onclick="toggleListen()">Listen</button>

<p id="status">Ready</p>

<div class="level-container">
  <div id="level-bar"></div>
</div>
<p class="level-label">Audio Level</p>

<div id="transport-badge" class="transport-badge" style="display: none;"></div>

<script>
let pc = null;
let wt = null; // WebTransport connection
let audioCtx = null;
let analyser = null;
let animFrame = null;
let isListening = false;
let reconnectTimeout = null;
let transportMode = null; // 'webtransport' or 'webrtc'
let webtransportPort = null;

const btn = document.getElementById('listen-btn');
const statusEl = document.getElementById('status');
const levelBar = document.getElementById('level-bar');
const transportBadge = document.getElementById('transport-badge');

function setStatus(text, state) {
  statusEl.textContent = text;
  btn.className = state || '';
}

function toggleListen() {
  if (isListening) {
    disconnect();
  } else {
    connect();
  }
}

function setTransportBadge(mode) {
  transportMode = mode;
  transportBadge.style.display = 'block';
  transportBadge.className = 'transport-badge ' + mode;
  transportBadge.textContent = mode === 'webtransport' ? 'WebTransport' : 'WebRTC (fallback)';
}

async function connect() {
  if (pc || wt) disconnect();
  isListening = true;
  btn.textContent = 'Stop';
  setStatus('Connecting...', 'connecting');

  // Get WebTransport port info
  try {
    const info = await fetch('/transport-info').then(r => r.json());
    webtransportPort = info.webtransport_port;
  } catch (e) {
    console.warn('Could not get transport info:', e);
  }

  // Try WebTransport first (if supported)
  if (typeof WebTransport !== 'undefined' && webtransportPort) {
    try {
      await connectWebTransport();
      return;
    } catch (e) {
      console.warn('WebTransport failed, falling back to WebRTC:', e);
    }
  }

  // Fall back to WebRTC
  await connectWebRTC();
}

async function connectWebTransport() {
  const host = window.location.hostname;
  const url = `https://${host}:${webtransportPort}/audio`;

  console.log('Trying WebTransport:', url);

  // Get cert hash from server
  const info = await fetch('/transport-info').then(r => r.json());
  if (!info.cert_hash) {
    throw new Error('WebTransport cert hash not available');
  }

  // Convert base64 cert hash to ArrayBuffer for WebTransport
  const hashBytes = Uint8Array.from(atob(info.cert_hash), c => c.charCodeAt(0));

  const options = {
    serverCertificateHashes: [{
      algorithm: 'sha-256',
      value: hashBytes.buffer
    }]
  };

  wt = new WebTransport(url, options);

  wt.closed.then(() => {
    console.log('WebTransport closed');
    if (isListening) {
      setStatus('Disconnected — reconnecting...', 'connecting');
      scheduleReconnect();
    }
  }).catch(e => {
    console.error('WebTransport closed with error:', e);
  });

  await wt.ready;
  console.log('WebTransport connected');

  setTransportBadge('webtransport');
  setStatus('Live', 'live');

  // Set up audio playback from datagrams
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({
    latencyHint: 'interactive',
    sampleRate: 48000,
  });

  // Create an AudioWorklet for playing raw PCM datagrams
  await audioCtx.audioWorklet.addModule(createPcmWorkletURL());

  const workletNode = new AudioWorkletNode(audioCtx, 'pcm-player', {
    outputChannelCount: [1],
  });

  // Create analyser for level meter
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  workletNode.connect(analyser);
  analyser.connect(audioCtx.destination);

  updateLevel();

  // Read datagrams and send to worklet
  const reader = wt.datagrams.readable.getReader();
  (async () => {
    try {
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        // Send raw PCM packet to worklet for playback
        workletNode.port.postMessage(value, [value.buffer]);
      }
    } catch (e) {
      console.error('Datagram read error:', e);
    }
  })();
}

function createPcmWorkletURL() {
  // AudioWorklet for playing raw PCM i16 samples
  const code = `
class PcmPlayerProcessor extends AudioWorkletProcessor {
  constructor() {
    super();
    this.buffer = new Float32Array(0);
    this.port.onmessage = (e) => {
      // Received raw PCM i16 little-endian bytes
      const bytes = new Uint8Array(e.data);
      const samples = new Int16Array(bytes.buffer);

      // Convert i16 to f32 and append to buffer
      const floats = new Float32Array(samples.length);
      for (let i = 0; i < samples.length; i++) {
        floats[i] = samples[i] / 32768.0;
      }

      // Append to playback buffer
      const newBuffer = new Float32Array(this.buffer.length + floats.length);
      newBuffer.set(this.buffer);
      newBuffer.set(floats, this.buffer.length);
      this.buffer = newBuffer;

      // Keep buffer from growing too large (limit to ~200ms)
      const maxSamples = 48000 * 0.2;
      if (this.buffer.length > maxSamples) {
        this.buffer = this.buffer.slice(this.buffer.length - maxSamples);
      }
    };
  }

  process(inputs, outputs, parameters) {
    const output = outputs[0][0];
    if (!output) return true;

    if (this.buffer.length >= output.length) {
      // We have enough samples - copy to output
      output.set(this.buffer.slice(0, output.length));
      this.buffer = this.buffer.slice(output.length);
    } else if (this.buffer.length > 0) {
      // Partial buffer - use what we have, pad with silence
      output.set(this.buffer);
      this.buffer = new Float32Array(0);
    }
    // else: output silence (buffer already zeroed)

    return true;
  }
}
registerProcessor('pcm-player', PcmPlayerProcessor);
`;
  const blob = new Blob([code], { type: 'application/javascript' });
  return URL.createObjectURL(blob);
}

async function connectWebRTC() {
  setTransportBadge('webrtc');

  try {
    pc = new RTCPeerConnection({ iceServers: [] });

    pc.ontrack = (event) => {
      const stream = event.streams[0] || new MediaStream([event.track]);

      // Request minimum jitter buffer (low latency mode)
      const receiver = event.receiver;
      if ('jitterBufferTarget' in receiver) {
        receiver.jitterBufferTarget = 0;
        console.log('Set jitterBufferTarget = 0');
      } else if ('playoutDelayHint' in receiver) {
        receiver.playoutDelayHint = 0;
        console.log('Set playoutDelayHint = 0');
      }

      // Play audio
      const audio = new Audio();
      audio.srcObject = stream;
      audio.play().catch(() => {});

      // Set up level meter
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);
      updateLevel();
    };

    pc.oniceconnectionstatechange = () => {
      const state = pc.iceConnectionState;
      if (state === 'connected' || state === 'completed') {
        setStatus('Live', 'live');
      } else if (state === 'disconnected') {
        setStatus('Disconnected — reconnecting...', 'connecting');
        scheduleReconnect();
      } else if (state === 'failed' || state === 'closed') {
        setStatus('Connection lost — reconnecting...', 'error');
        scheduleReconnect();
      }
    };

    pc.addTransceiver('audio', { direction: 'recvonly' });

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    const response = await fetch('/offer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sdp: pc.localDescription.sdp,
        type: pc.localDescription.type
      })
    });

    if (!response.ok) {
      throw new Error('Server returned ' + response.status);
    }

    const answer = await response.json();
    await pc.setRemoteDescription(new RTCSessionDescription({
      sdp: answer.sdp,
      type: answer.type
    }));

  } catch (e) {
    console.error('WebRTC connection error:', e);
    setStatus('Error: ' + e.message, 'error');
    scheduleReconnect();
  }
}

function disconnect() {
  isListening = false;
  btn.textContent = 'Listen';
  clearTimeout(reconnectTimeout);
  reconnectTimeout = null;

  if (animFrame) {
    cancelAnimationFrame(animFrame);
    animFrame = null;
  }
  if (audioCtx) {
    audioCtx.close().catch(() => {});
    audioCtx = null;
    analyser = null;
  }
  if (pc) {
    pc.close();
    pc = null;
  }
  if (wt) {
    wt.close();
    wt = null;
  }
  transportMode = null;
  transportBadge.style.display = 'none';
  levelBar.style.width = '0%';
  setStatus('Ready', '');
}

function scheduleReconnect() {
  if (!isListening || reconnectTimeout) return;
  reconnectTimeout = setTimeout(() => {
    reconnectTimeout = null;
    if (isListening) {
      if (pc) { pc.close(); pc = null; }
      connect();
    }
  }, 3000);
}

function updateLevel() {
  if (!analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  let sum = 0;
  for (let i = 0; i < data.length; i++) sum += data[i];
  const avg = sum / data.length;
  const pct = Math.min(100, (avg / 128) * 100);
  levelBar.style.width = pct + '%';
  animFrame = requestAnimationFrame(updateLevel);
}
</script>

<div class="nav">
  <a href="/latency_test">Latency Test</a>
</div>

</body>
</html>
