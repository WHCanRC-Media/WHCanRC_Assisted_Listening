<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Latency Test — WHCanRC</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 { font-size: 1.3rem; margin-bottom: 6px; }
  .subtitle { font-size: 0.8rem; color: #888; margin-bottom: 20px; text-align: center; }
  .status-bar {
    display: flex; gap: 16px; margin-bottom: 20px; font-size: 0.85rem;
  }
  .status-item { display: flex; align-items: center; gap: 6px; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%; background: #555;
  }
  .dot.ok { background: #4caf50; }
  .dot.err { background: #f44336; }
  .dot.wait { background: #ff9800; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  #state {
    font-size: 1.1rem; font-weight: 600; margin: 16px 0;
    min-height: 1.4em; text-align: center;
  }
  #latency-display {
    font-size: 3rem; font-weight: 700; color: #4a90d9;
    margin: 8px 0; min-height: 1.2em;
  }
  #latency-display.fresh { color: #4caf50; }

  .meters {
    display: flex; gap: 20px; width: 100%; max-width: 400px; margin: 16px 0;
  }
  .meter { flex: 1; }
  .meter-label { font-size: 0.75rem; color: #888; margin-bottom: 4px; text-align: center; }
  .meter-bar-bg {
    height: 8px; background: #333; border-radius: 4px; overflow: hidden;
  }
  .meter-bar {
    height: 100%; width: 0%; border-radius: 4px; transition: width 0.05s;
  }
  .meter-bar.mic { background: #4a90d9; }
  .meter-bar.stream { background: #4caf50; }

  .history { margin-top: 20px; width: 100%; max-width: 400px; }
  .history h3 { font-size: 0.85rem; color: #888; margin-bottom: 8px; }
  .history-stats {
    display: flex; justify-content: space-around; margin-bottom: 12px;
    font-size: 0.85rem;
  }
  .history-stats span { text-align: center; }
  .history-stats .val { font-size: 1.1rem; font-weight: 600; display: block; }
  #history-list {
    list-style: none; font-size: 0.8rem; color: #aaa;
    max-height: 150px; overflow-y: auto;
  }
  #history-list li { padding: 2px 0; border-bottom: 1px solid #2a2a3e; }

  button {
    margin-top: 16px; padding: 10px 28px; border-radius: 8px;
    border: 2px solid #4a90d9; background: rgba(74,144,217,0.15);
    color: #4a90d9; font-size: 1rem; font-weight: 600; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button:hover { background: rgba(74,144,217,0.3); }
  button:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>

<h1>Latency Test</h1>
<p class="subtitle">Snap or clap near the server mic to measure end-to-end delay</p>

<div class="status-bar">
  <div class="status-item"><div class="dot" id="dot-stream"></div><span id="lbl-stream">Stream: ---</span></div>
  <div class="status-item"><div class="dot" id="dot-mic"></div><span id="lbl-mic">Mic: ---</span></div>
</div>

<div id="state">Press Start to begin</div>
<div id="latency-display"></div>

<div class="meters">
  <div class="meter">
    <div class="meter-label">Local Mic: <span id="mic-peak-val">0.00</span></div>
    <div class="meter-bar-bg"><div class="meter-bar mic" id="mic-level"></div></div>
  </div>
  <div class="meter">
    <div class="meter-label">WebRTC Stream: <span id="stream-peak-val">0.00</span></div>
    <div class="meter-bar-bg"><div class="meter-bar stream" id="stream-level"></div></div>
  </div>
</div>

<div class="history" id="history-section" style="display:none;">
  <h3>Measurements</h3>
  <div class="history-stats">
    <span>Min<span class="val" id="stat-min">-</span></span>
    <span>Avg<span class="val" id="stat-avg">-</span></span>
    <span>Max<span class="val" id="stat-max">-</span></span>
    <span>Count<span class="val" id="stat-count">0</span></span>
  </div>
  <ul id="history-list"></ul>
</div>

<button id="start-btn" onclick="start()">Start</button>
<button id="reset-btn" onclick="resetHistory()" style="display:none;">Reset</button>

<script>
const SPIKE_MULTIPLIER = 6;    // spike must be Nx the running noise floor
const MIN_SPIKE_ABS = 0.04;    // minimum absolute peak to count as spike
const COOLDOWN_MS = 1000;      // minimum ms between measurements
const SEARCH_WINDOW_MS = 500;  // how long after mic spike to wait for stream spike
const SAMPLE_INTERVAL_MS = 2;  // how often to poll audio levels
const FLOOR_DECAY = 0.97;      // exponential moving average for noise floor

let audioCtx = null;
let micAnalyser = null;
let streamAnalyser = null;
let pc = null;
let micStream = null;
let running = false;
let pollTimer = null;

// Adaptive noise floor tracking
let micFloor = 0.01;
let streamFloor = 0.01;

// Measurement state
let micSpikeTime = null;
let waitingForStream = false;
let lastMeasurementTime = 0;
let measurements = [];

const stateEl = document.getElementById('state');
const latencyEl = document.getElementById('latency-display');
const micLevelEl = document.getElementById('mic-level');
const streamLevelEl = document.getElementById('stream-level');
const micPeakVal = document.getElementById('mic-peak-val');
const streamPeakVal = document.getElementById('stream-peak-val');

async function start() {
  document.getElementById('start-btn').disabled = true;

  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({
      latencyHint: 'interactive',
      sampleRate: 48000,
    });
    // Resume in case browser suspended it (requires user gesture — we're inside onclick)
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    // 1. Get local mic
    updateStatus('mic', 'wait', 'Mic: requesting...');
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
    });
    const micSource = audioCtx.createMediaStreamSource(micStream);
    micAnalyser = audioCtx.createAnalyser();
    micAnalyser.fftSize = 256;
    micSource.connect(micAnalyser);
    updateStatus('mic', 'ok', 'Mic: active');

    // 2. Connect to WebRTC stream
    updateStatus('stream', 'wait', 'Stream: connecting...');
    await connectWebRTC();

    // 3. Start polling
    running = true;
    stateEl.textContent = 'Waiting for snap...';
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = '';
    pollTimer = setInterval(pollAudio, SAMPLE_INTERVAL_MS);

  } catch (e) {
    stateEl.textContent = 'Error: ' + e.message;
    document.getElementById('start-btn').disabled = false;
  }
}

async function connectWebRTC() {
  if (typeof AudioDecoder === 'undefined' || typeof EncodedAudioChunk === 'undefined') {
    if (!window.isSecureContext) {
      throw new Error('Page is not a secure context — self-signed certs are not trusted on mobile. Go to chrome://flags/#unsafely-treat-insecure-origin-as-secure and add this origin, then relaunch.');
    }
    throw new Error('WebCodecs (AudioDecoder) not available. Use Chrome 94+ (Firefox does not support WebCodecs on Android).');
  }

  pc = new RTCPeerConnection({ iceServers: [] });
  pc.createDataChannel('_init');
  await connectLowLatency();
}

async function connectLowLatency() {
  const workletCode = `
  class PassthroughProcessor extends AudioWorkletProcessor {
    constructor() {
      super();
      this.buffer = new Float32Array(4800);
      this.writePos = 0; this.readPos = 0; this.count = 0;
      this.port.onmessage = (e) => {
        const s = e.data;
        for (let i = 0; i < s.length; i++) {
          if (this.count < this.buffer.length) {
            this.buffer[this.writePos] = s[i];
            this.writePos = (this.writePos + 1) % this.buffer.length;
            this.count++;
          } else {
            this.buffer[this.writePos] = s[i];
            this.writePos = (this.writePos + 1) % this.buffer.length;
            this.readPos = (this.readPos + 1) % this.buffer.length;
          }
        }
      };
    }
    process(inputs, outputs) {
      const out = outputs[0][0];
      if (!out) return true;
      for (let i = 0; i < out.length; i++) {
        if (this.count > 0) {
          out[i] = this.buffer[this.readPos];
          this.readPos = (this.readPos + 1) % this.buffer.length;
          this.count--;
        } else { out[i] = 0; }
      }
      return true;
    }
  }
  registerProcessor('passthrough', PassthroughProcessor);
  `;
  const blob = new Blob([workletCode], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  await audioCtx.audioWorklet.addModule(url);
  URL.revokeObjectURL(url);

  const workletNode = new AudioWorkletNode(audioCtx, 'passthrough');
  streamAnalyser = audioCtx.createAnalyser();
  streamAnalyser.fftSize = 256;
  workletNode.connect(streamAnalyser);
  workletNode.connect(audioCtx.destination);

  let packetsReceived = 0;
  const decoder = new AudioDecoder({
    output: (audioData) => {
      const samples = new Float32Array(audioData.numberOfFrames);
      audioData.copyTo(samples, { planeIndex: 0, format: 'f32-planar' });
      workletNode.port.postMessage(samples, [samples.buffer]);
      audioData.close();
    },
    error: (e) => console.error('AudioDecoder error:', e),
  });
  decoder.configure({ codec: 'opus', sampleRate: 48000, numberOfChannels: 1 });

  const dcReady = new Promise((resolve) => {
    pc.ondatachannel = (event) => {
      const dc = event.channel;
      dc.binaryType = 'arraybuffer';
      dc.onmessage = (msg) => {
        packetsReceived++;
        try {
          decoder.decode(new EncodedAudioChunk({
            type: 'key', timestamp: packetsReceived * 10000,
            data: new Uint8Array(msg.data),
          }));
        } catch(e) {}
      };
      dc.onopen = () => {
        updateStatus('stream', 'ok', 'Stream: live (low latency)');
        resolve();
      };
    };
  });

  pc.oniceconnectionstatechange = () => {
    if (pc.iceConnectionState === 'failed' || pc.iceConnectionState === 'closed')
      updateStatus('stream', 'err', 'Stream: ' + pc.iceConnectionState);
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  const resp = await fetch('/offer_low_latency', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sdp: pc.localDescription.sdp, type: pc.localDescription.type }),
  });
  if (!resp.ok) throw new Error('Server returned ' + resp.status);
  const answer = await resp.json();
  await pc.setRemoteDescription(new RTCSessionDescription({ sdp: answer.sdp, type: answer.type }));

  await Promise.race([
    dcReady,
    new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout waiting for DataChannel')), 10000)),
  ]);
}


function pollAudio() {
  if (!micAnalyser || !streamAnalyser) return;

  const now = performance.now();

  // Read peak amplitudes
  const micPeak = getPeak(micAnalyser);
  const streamPeak = getPeak(streamAnalyser);

  // Update level meters and debug values
  micLevelEl.style.width = Math.min(100, micPeak * 200) + '%';
  streamLevelEl.style.width = Math.min(100, streamPeak * 200) + '%';
  micPeakVal.textContent = micPeak.toFixed(3);
  streamPeakVal.textContent = streamPeak.toFixed(3);

  // Update noise floors (only when not in a spike)
  const micIsSpike = micPeak > micFloor * SPIKE_MULTIPLIER && micPeak > MIN_SPIKE_ABS;
  const streamIsSpike = streamPeak > streamFloor * SPIKE_MULTIPLIER && streamPeak > MIN_SPIKE_ABS;

  if (!micIsSpike) {
    micFloor = micFloor * FLOOR_DECAY + micPeak * (1 - FLOOR_DECAY);
  }
  if (!streamIsSpike) {
    streamFloor = streamFloor * FLOOR_DECAY + streamPeak * (1 - FLOOR_DECAY);
  }

  // State machine for impulse detection
  if (!waitingForStream) {
    // Looking for mic spike
    if (micIsSpike && (now - lastMeasurementTime) > COOLDOWN_MS) {
      micSpikeTime = now;
      waitingForStream = true;
      stateEl.textContent = 'Snap detected (mic peak: ' + micPeak.toFixed(3) + ')! Waiting for stream...';
    }
  } else {
    // Mic spike detected, looking for stream spike
    if (streamIsSpike) {
      const latency = now - micSpikeTime;
      recordMeasurement(latency);
      waitingForStream = false;
      lastMeasurementTime = now;
    } else if (now - micSpikeTime > SEARCH_WINDOW_MS) {
      // Timeout — stream spike not found
      stateEl.textContent = 'Missed — stream floor: ' + streamFloor.toFixed(4) + ', need ' + (streamFloor * SPIKE_MULTIPLIER).toFixed(4) + '. Try louder.';
      waitingForStream = false;
      lastMeasurementTime = now;
    }
  }
}

function getPeak(analyser) {
  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  let peak = 0;
  for (let i = 0; i < buf.length; i++) {
    const abs = Math.abs(buf[i]);
    if (abs > peak) peak = abs;
  }
  return peak;
}

function getOutputLatencyMs() {
  if (!audioCtx) return 0;
  const output = audioCtx.outputLatency || 0;  // not supported in all browsers
  const base = audioCtx.baseLatency || 0;
  return (output + base) * 1000;
}

function recordMeasurement(ms) {
  const outputMs = getOutputLatencyMs();
  const totalMs = ms + outputMs;

  measurements.push(totalMs);
  latencyEl.textContent = totalMs.toFixed(0) + ' ms';
  latencyEl.className = 'fresh';
  setTimeout(() => { latencyEl.className = ''; }, 500);
  stateEl.textContent = 'Waiting for snap...';

  // Update stats
  document.getElementById('history-section').style.display = '';
  const min = Math.min(...measurements);
  const max = Math.max(...measurements);
  const avg = measurements.reduce((a, b) => a + b, 0) / measurements.length;
  document.getElementById('stat-min').textContent = min.toFixed(0) + ' ms';
  document.getElementById('stat-avg').textContent = avg.toFixed(0) + ' ms';
  document.getElementById('stat-max').textContent = max.toFixed(0) + ' ms';
  document.getElementById('stat-count').textContent = measurements.length;

  const detail = outputMs > 0
    ? `#${measurements.length}: ${totalMs.toFixed(0)} ms (pipeline: ${ms.toFixed(0)} + output: ${outputMs.toFixed(0)})`
    : `#${measurements.length}: ${totalMs.toFixed(0)} ms`;
  const li = document.createElement('li');
  li.textContent = detail;
  document.getElementById('history-list').prepend(li);
}

function resetHistory() {
  measurements = [];
  latencyEl.textContent = '';
  document.getElementById('history-section').style.display = 'none';
  document.getElementById('history-list').innerHTML = '';
  stateEl.textContent = 'Waiting for snap...';
}

function updateStatus(which, state, label) {
  document.getElementById('dot-' + which).className = 'dot ' + state;
  document.getElementById('lbl-' + which).textContent = label;
}
</script>
</body>
</html>
