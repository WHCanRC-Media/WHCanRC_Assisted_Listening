name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build release
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Package binary
        run: |
          cp target/x86_64-unknown-linux-gnu/release/whcanrc-assisted-listening whcanrc-assisted-listening-linux-x86_64
          tar czf whcanrc-assisted-listening-linux-x86_64.tar.gz whcanrc-assisted-listening-linux-x86_64 config.toml.example
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            whcanrc-assisted-listening-linux-x86_64
            whcanrc-assisted-listening-linux-x86_64.tar.gz

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Rename binary
        run: |
          copy target\x86_64-pc-windows-msvc\release\whcanrc-assisted-listening.exe whcanrc-assisted-listening-windows-x86_64.exe
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: whcanrc-assisted-listening-windows-x86_64.exe

  build-installer:
    name: Build NSIS Installer
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
      - name: Install NSIS
        run: choco install nsis -y
      - name: Build installer
        run: makensis installer\installer.nsi
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-artifacts
          path: installer/whcanrc-assisted-listening-setup.exe

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-installer]
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            whcanrc-assisted-listening-linux-x86_64
            whcanrc-assisted-listening-linux-x86_64.tar.gz
            whcanrc-assisted-listening-windows-x86_64.exe
            whcanrc-assisted-listening-setup.exe
          generate_release_notes: true
