name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Run tests
        run: cargo test --all

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --all

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Run clippy
        run: cargo clippy -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  build-linux:
    name: Build Release (Linux)
    runs-on: ubuntu-latest
    needs: [test-linux, clippy, fmt]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build release
        run: cargo build --release
      - name: Package binary
        run: |
          cp target/release/whcanrc-assisted-listening whcanrc-assisted-listening-linux-x86_64
          tar czf whcanrc-assisted-listening-linux-x86_64.tar.gz whcanrc-assisted-listening-linux-x86_64 static/
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            whcanrc-assisted-listening-linux-x86_64
            whcanrc-assisted-listening-linux-x86_64.tar.gz

  build-windows:
    name: Build Release (Windows)
    runs-on: windows-latest
    needs: [test-windows]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release
        run: cargo build --release
      - name: Package binary
        run: |
          copy target\release\whcanrc-assisted-listening.exe whcanrc-assisted-listening-windows-x86_64.exe
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: whcanrc-assisted-listening-windows-x86_64.exe
